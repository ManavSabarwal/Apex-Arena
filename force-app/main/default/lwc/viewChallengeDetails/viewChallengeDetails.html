<template>

    <div class="app-container">

        <template if:true={isNavigating}>
            <c-loading-animation></c-loading-animation>
        </template>

        <!-- HEADER -->
        <c-nav-bar-component onnavigate={setNavigating}></c-nav-bar-component>

        <template if:true={userSearchProfile}>
                    <div style="    text-align: center;font-weight: 700;background: linear-gradient(45deg, #ed4b4b, orange);">
                        <span>You are viewing {username}'s profile.</span>
                        <button class="backToProfileButton" onclick={backToProfile} data-id='profile'> Back to My Profile</button>
                    </div>
                </template>

        <div class="main-container">
            <div class="header-container">
                <span class="back-btn" onclick={backToProfile}> ← Back to Profile</span>
                <div class="header-cont">
                    <div class="header-left">
                        <div class="challenge-icon-wrapper">

                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">

                                <rect x="3" y="4" width="18" height="16" rx="2" />
                                <path d="M8 9h8" />
                                <path d="M8 13h5" />
                                <path d="M16 16l2 2 3-3" />

                            </svg>
                        </div>

                        <div style="display:grid;gap:10px;">
                            <span class="header">{challengeName}</span>
                            <p class="exp-label">{scenario}</p>
                            <div style="display:flex;gap:10px;align-items:center;padding-top:10px;">
                                <p class={DiffClass}>{difficulty}</p>
                                <p class="type">{type}</p>
                                <p class={path}>Path:{path}</p>
                                <p class={finalResult}>{finalResult}</p>
                            </div>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="expcont">
                            <div style="    height: 30px; width: 30px;color:#ef7c30">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <path d="M3 17l6-6 4 4 8-8" />
                                    <path d="M14 7h7v7" />
                                </svg>
                            </div>
                            <span>Exp Gained : </span><span style="color:#ef7c30;"> {challengeExp} XP</span>
                        </div>
                        <div style="display: flex;gap: 10px;">
                            <div class="total-attempts-cont">
                                <div class="total-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">

                                        <rect x="3" y="4" width="18" height="16" rx="2" />
                                        <path d="M8 9h8" />
                                        <path d="M8 13h8" />
                                        <path d="M8 17h5" />

                                    </svg>
                                </div>
                                <div class="total-attempts-info">
                                    <span style="font-size:12px">Total Attempts</span>
                                    <span class="total-attempts">{totalAttempts}</span>
                                </div>

                            </div>

                            <div class="total-attempts-cont">
                                <div>
                                    <svg class="passed-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                        width="64" height="64" fill="none" stroke="currentColor" stroke-width="1"
                                        stroke-linecap="round" stroke-linejoin="round">

                                        <circle cx="12" cy="12" r="9" />
                                        <path d="M8 12l3 3 5-6" />

                                    </svg>
                                </div>
                                <div class="total-attempts-info">
                                    <span style="font-size:12px">Passed</span>
                                    <span class="passed-attempts">{successfulAttempts}</span>
                                </div>

                            </div>

                            <div class="total-attempts-cont">
                                <div>
                                    <svg class="failed-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                        width="64" height="64" fill="none" stroke="currentColor" stroke-width="1"
                                        stroke-linecap="round" stroke-linejoin="round">

                                        <circle cx="12" cy="12" r="9" />
                                        <path d="M9 9l6 6" />
                                        <path d="M15 9l-6 6" />

                                    </svg>
                                </div>
                                <div class="total-attempts-info">
                                    <span style="font-size:12px">Failed</span>
                                    <span class="failed-attempts">{failedAttempts}</span>
                                </div>

                            </div>

                            <div class="total-attempts-cont">
                                <svg class="successRate-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                    width="64" height="64" fill="none" stroke="currentColor" stroke-width="1"
                                    stroke-linecap="round" stroke-linejoin="round">

                                    <circle cx="12" cy="12" r="8" />
                                    <circle cx="12" cy="12" r="4" />
                                    <path d="M12 2v3" />
                                    <path d="M12 19v3" />
                                    <path d="M2 12h3" />
                                    <path d="M19 12h3" />

                                </svg>
                                <div class="total-attempts-info">
                                    <span style="font-size:12px">Success Rate</span>
                                    <span class="successRate">{successRate}%</span>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <div class="details-container">
                <template if:false={display}>
                    <div class="noData">
                        <svg class="noData-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="180"
                            height="180" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round">

                            <!-- Code Window -->
                            <rect x="10" y="12" width="44" height="36" rx="4" />

                            <!-- Window Header -->
                            <line x1="10" y1="20" x2="54" y2="20" />

                            <!-- Code Symbol -->
                            <path d="M24 28l-6 6 6 6" />
                            <path d="M40 28l6 6-6 6" />
                            <line x1="34" y1="25" x2="30" y2="43" />

                            <!-- Empty State Badge -->
                            <circle cx="46" cy="48" r="8" />

                            <!-- X Mark -->
                            <line x1="42" y1="44" x2="50" y2="52" />
                            <line x1="50" y1="44" x2="42" y2="52" />

                        </svg>
                        <div style="display: grid;gap: 20px;">
                            <span style="font-size: 20px;font-weight: 700;"> No Attempts Yet</span>
                            <span style="font-size: 15px;color: rgb(125, 125, 125);">You haven't submitted any attempt
                                for this challenge yet.<br>
                                Take the first step and start coding now!!</span>

                            <button class="primary-btn" onclick={tryAgainMethod}>Give it a Try Now!</button>
                        </div>
                    </div>
                </template>
                <template if:true={display}>
                    <div class="activity-history-container">
                        <span style="font-size: 16px;font-weight: 700;">Activity History</span>
                        <span style="font-size: 13px;color: rgb(155, 155, 155);">All of your attempts for this
                            challenge</span>
                        <div class="attempts-container">

                            <template for:each={challengeAttempts} for:item="attempt">

                                <div key={attempt.Id} class="attempt-row">

                                    <!-- Timeline -->
                                    <div class="timeline">

                                        <div class={attempt.icon}>
                                            {attempt.icon}
                                        </div>
                                        <template lwc:if={attempt.showLine}>
                                        <div class="timeline-line"></div>
                                            </template>
                                    </div>

                                    <!-- Card -->
                                    <div class={attempt.cardClass} data-value={attempt.Id} onclick={handleCardClick}>

                                        <div class="attempt-header">

                                            <div class="attempt-info">

                                                <div class="attempt-title">
                                                    {attempt.Name}
                                                </div>

                                                <span class={attempt.badgeClass}>
                                                    {attempt.Result}
                                                </span>
                                                <template lwc:if={attempt.ActionType}>

                                                <span class={attempt.ActionType}>
                                                    <p >Action : </p>{attempt.ActionType}
                                                </span>
                                                </template>

                                            </div>
                                            <div class="attempt-meta">

                                                <div class="meta-item">
                                                    📅 {attempt.attemptDate}
                                                </div>

                                                <div class="meta-item">
                                                    •
                                                </div>

                                                <div class="meta-item">
                                                    {attempt.attemptTime}
                                                </div>

                                            </div>

                                        </div>



                                        <div style="display: flex;gap: 10px;">



                                            <div class="stat">
                                                <span class="label">Score</span>
                                                <span class={attempt.scoreClass}>
                                                    {attempt.Score}%
                                                </span>
                                            </div>

                                            <div class="stat">
                                                <span class="label">Exp Gained</span>
                                                <span class={attempt.ExpGained}>
                                                    {attempt.ExpGained} XP
                                                </span>
                                            </div>


                                        </div>

                                    </div>

                                </div>

                            </template>

                        </div>

                            <button class="tryAgainButton" onclick={tryAgainMethod}>{isUserSearchTryButtonText} ?
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round" style="width: 20px;">

                                    <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                                    <polyline points="21 3 21 9 15 9" />

                                </svg>
                            </button>

                    </div>

                    <div class="activity-details-container">
                        <template if:true={loading}>
                            <div class="loading-dots">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </template>
                        <template if:false={loading}>
                            <div
                                style="display: flex;border-bottom: 1px solid rgba(85, 85, 85, 0.5);padding-bottom: 10px;">
                                <div>
                                    <span style="font-size: 16px; font-weight: 700;">{selectedChallenge.Name}
                                        Details</span>
                                    <div class="attempt-meta">

                                        <div class="meta-item">
                                            📅 {selectedChallenge.attemptDate}
                                        </div>

                                        <div class="meta-item">
                                            •
                                        </div>

                                        <div class="meta-item">
                                            {selectedChallenge.attemptTime}
                                        </div>
                                    </div>
                                </div>
                                <div class="metadata">
                                    <span class={selectedChallenge.badgeClass}>
                                        {selectedChallenge.Result}
                                    </span>
                                    <div style="justify-content: flex-end;flex: 1;display: flex;">
                                        <span class={selectedChallenge.scoreClass}>Score
                                            {selectedChallenge.Score}%</span>
                                    </div>
                                </div>
                            </div>

                            <div class="attempt-details-container">
                                <div class="optionsMenu">
                                    <span class={codemenuItem} data-menu="Code" onclick={handleMenuClick}>Code</span>
                                    <template if:true={showSampleData}>
                                        <span class={sampleMenuItem} data-menu="Sample" onclick={handleMenuClick}>Test
                                            Cases</span>
                                    </template>

                                    <span class={aiMenuItem} data-menu="AI" onclick={handleMenuClick}>AI Code
                                        Review</span>
                                </div>
                                <div class="data-cont">
                                    <template if:true={isCodeSelected}>
                                        <div class="actual-data">
                                            <code style="font-size: 13px;">
                                            {selectedChallenge.SolutionProvided}
                                        </code>
                                        </div>
                                    </template>
                                    <template if:true={isSampleSelected}>
                                        <div class="actual-data">
                                            <div
                                                style="background: linear-gradient(45deg, #242743, #1e324b);font-size: 15px;font-weight: 700;border: 1px solid rgb(85, 85, 85);border-radius: 5px;padding: 10px;">
                                                Test Case Result: {passed}/{total}
                                            </div>
                                            <div class="modal-grid">

                                                <template for:each={resultsWithStyle} for:item="sc">

                                                    <div key={sc.scenarioName}>

                                                        <div class="card-title">
                                                            {sc.scenarioName}
                                                        </div>
                                                        <div class="scenario-row">
                                                            <!-- LEFT -->
                                                            <div class="card left-card">



                                                                <div class="section">
                                                                    <div class="label">Sample Input</div>
                                                                    <div class="box">{sc.sampleInput}</div>
                                                                </div>

                                                                <div class="section">
                                                                    <div class="label">Expected Output</div>
                                                                    <div class="box">{sc.expectedOutput}</div>
                                                                </div>

                                                            </div>

                                                            <!-- RIGHT -->
                                                            <div class="card right-card">

                                                                <div class="section">
                                                                    <div class="label">Actual Output</div>
                                                                    <div class="box">{sc.actualOutput}</div>
                                                                </div>

                                                                <div class="status-row">
                                                                    <span class="status-label">Status</span>
                                                                    <span class={sc.statusClass}>
                                                                        {sc.status}
                                                                    </span>
                                                                </div>

                                                                <div class="section">
                                                                    <div class="label">Failure Reason</div>
                                                                    <div class="box error-box">
                                                                        {sc.failureReason}
                                                                    </div>
                                                                </div>

                                                            </div>
                                                        </div>

                                                    </div>

                                                </template>

                                            </div>


                                        </div>
                                    </template>
                                    <template if:true={isAiReviewSelected}>
                                        <div class="actual-data">
                                            <div class="reviewCont">
                                                <span style="font-weight:700;">Strengths</span>
                                                <div class="reviewPoints">
                                                    <template for:each={selectedChallenge.CodeReviewGood}
                                                        for:item="reviewPoint">
                                                        <code key={reviewPoint}>
                                               ✓ {reviewPoint}
                                            </code>
                                                    </template>
                                                </div>
                                            </div>
                                            <div class="reviewCont">
                                                <span style="font-weight:700;">Areas For Improvements</span>
                                                <div class="reviewPointsBad">
                                                    <template for:each={selectedChallenge.CodeReviewBad}
                                                        for:item="reviewPoint">
                                                        <code key={reviewPoint}>
                                                ⚠ {reviewPoint}
                                            </code>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

        </div>
    </div>

</template>
