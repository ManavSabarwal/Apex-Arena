<template>

    <div class="app-container">

        <!-- HEADER -->
        <div class="navbar">

            <div class="logo-section">
                <div class="logo-icon">AA</div>
                <div class="logo-text">Apex Arena</div>
            </div>

            <div class="nav-links">
                <a class="active-link">Homepage</a>
                <a>Contact</a>
            </div>

            <div class="nav-right">

                <div class="user-box">
                    <span onclick={choosePath}>Choose Path</span>
                </div>

                <div class="logout-btn" onclick={logoutFunc}>
                    <span>⎋ Logout</span>
                </div>
            </div>

        </div>

        <div class="main-container">
            <div class="header-container">
                <span class="back-btn" onclick={backToProfile}> ← Back to Profile</span>
                <div class="header-cont">
                    <div class="header-left">
                        <div class="challenge-icon-wrapper">

                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="40" height="40"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">

                                <rect x="3" y="4" width="18" height="16" rx="2" />
                                <path d="M8 9h8" />
                                <path d="M8 13h5" />
                                <path d="M16 16l2 2 3-3" />

                            </svg>
                        </div>

                        <div style="display:grid;">
                            <span class="header">{challengeName}</span>
                            <p class="exp-label">{scenario}</p>
                            <div style="display:flex;gap:10px;align-items:center;padding-top:10px;">
                                <p class={difficulty}>{difficulty}</p>
                                <p class="type">{type}</p>
                                <p class={path}>Path:{path}</p>
                            </div>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="total-attempts-cont">
                            <div class="total-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <rect x="3" y="4" width="18" height="16" rx="2" />
                                    <path d="M8 9h8" />
                                    <path d="M8 13h8" />
                                    <path d="M8 17h5" />

                                </svg>
                            </div>
                            <div class="total-attempts-info">
                                <span style="font-size:12px">Total Attempts</span>
                                <span class="total-attempts">{totalAttempts}</span>
                            </div>

                        </div>

                        <div class="total-attempts-cont">
                            <div class="passed-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64"
                                    fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <circle cx="12" cy="12" r="9" />
                                    <path d="M8 12l3 3 5-6" />

                                </svg>
                            </div>
                            <div class="total-attempts-info">
                                <span style="font-size:12px">Passed</span>
                                <span class="passed-attempts">{successfulAttempts}</span>
                            </div>

                        </div>

                        <div class="total-attempts-cont">
                            <div class="failed-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64"
                                    fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <circle cx="12" cy="12" r="9" />
                                    <path d="M9 9l6 6" />
                                    <path d="M15 9l-6 6" />

                                </svg>
                            </div>
                            <div class="total-attempts-info">
                                <span style="font-size:12px">Failed</span>
                                <span class="failed-attempts">{failedAttempts}</span>
                            </div>

                        </div>

                        <div class="total-attempts-cont">
                                <svg class="successRate-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64"
                                    fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <circle cx="12" cy="12" r="8" />
                                    <circle cx="12" cy="12" r="4" />
                                    <path d="M12 2v3" />
                                    <path d="M12 19v3" />
                                    <path d="M2 12h3" />
                                    <path d="M19 12h3" />

                                </svg>
                            <div class="total-attempts-info">
                                <span style="font-size:12px">Success Rate</span>
                                <span class="successRate">{successRate}%</span>
                            </div>

                        </div>

                    </div>
                </div>

            </div>

        </div>
    </div>

</template>
