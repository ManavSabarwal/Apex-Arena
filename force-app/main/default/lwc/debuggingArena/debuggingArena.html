<template>
    <div class="app-container">

        <template if:true={isNavigating}>
            <c-loading-animation></c-loading-animation>
        </template>

        <c-modal-component onclosemodal={showNewAchievements}></c-modal-component>
        <c-show-achievement-modal ></c-show-achievement-modal>

        

        <!-- HEADER -->
        <c-nav-bar-component onnavigate={setNavigating}></c-nav-bar-component>

        <!-- MAIN CONTENT -->
        <div class="main-layout">

            <!-- PROBLEM PANEL -->
            <section class="problem">

                <div class="glass-card problem-panel">

                    <div class="problem-header" onclick={hideProblemOptions}>
                        <p>Problem Options</p>
                        <p id="chevronIcon" class={arrowClass}>{arrowIcon}</p>
                    </div>

                    <section class={sectionClass}>

                        <div class="difficulty-container">
                            <span class="difficultylabel">Difficulty</span>
                            <div class="difficulty-options">
                                <button class={easyClass} data-value="Easy" onclick={handleDifficulty}>Easy</button>
                                <button class={mediumClass} data-value="Medium"
                                    onclick={handleDifficulty}>Medium</button>
                                <button class={hardClass} data-value="Hard" onclick={handleDifficulty}>Hard</button>
                            </div>
                        </div>

                        <div class="type-container">
                            <span class="typelabel">Type</span>
                            <div class="type-options">
                                <button class={SynchronousApex} data-value="Sync Apex" onclick={handleType}>Synchronous
                                    Apex</button>
                                <button class={AsynchronousApex} data-value="Async Apex"
                                    onclick={handleType}>Asynchronous Apex</button>
                                <button class={Trigger} data-value="Trigger" onclick={handleType}>Trigger</button>
                                <button class={TestClass} data-value="Test Class" onclick={handleType}>Test
                                    Class</button>
                            </div>
                        </div>
                        <button class="generateProblem-btn" onclick={generateProblem} disabled={isLoading}> Generate New Problem</button>
                    </section>
                </div>
                <div class="scrollable-content glass-card">

                    <template if:true={isLoading}>
                        <div class="loading-state">
                            <div class="spinner"></div>
                            <span>Loading problem...</span>
                        </div>
                    </template>

                    <template if:false={isLoading}>
                        <template if:true={dataLoaded}>
                            <div class="problem-title-container" onclick={hideProblem}>
                                <p class="problem-detail">Problem Details</p>
                                <p class="problem-title">{problemTitle}</p>
                                <span class="problemLevel">{difficultyfromPrompt}</span>
                            </div>

                            <div class={problemSectionClass}>
                                <div>
                                    <div class="svgDiv">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                            stroke-linecap="round" stroke-linejoin="round">

                                            <path d="M8 9h8" />
                                            <path d="M9 3l1 2" />
                                            <path d="M15 3l-1 2" />
                                            <rect x="7" y="5" width="10" height="12" rx="5" />
                                            <path d="M3 13h4" />
                                            <path d="M17 13h4" />
                                            <path d="M5 7l2 2" />
                                            <path d="M19 7l-2 2" />
                                            <path d="M5 19l2-2" />
                                            <path d="M19 19l-2-2" />
                                        </svg>
                                        <p class="scenario-label">Scenario</p>

                                    </div>
                                    <p class="scenario-text">{scenario}</p>
                                </div>
                                <div style="margin-top:5px">
                                    <div class="svgDiv">

                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                            stroke-linecap="round" stroke-linejoin="round">

                                            <path d="M7 8l-4 4 4 4" />
                                            <path d="M17 8l4 4-4 4" />

                                            <rect x="9" y="7" width="6" height="10" rx="3" />
                                            <path d="M10 5l1 2" />
                                            <path d="M14 5l-1 2" />
                                        </svg>

                                        <p class="scenario-label">Erroneous Code</p>
                                    </div>

                                </div>
                                <div class="error-code-container">

                                    <pre class="error-code-text">
                                {code}
                            </pre>
                                </div>
                                <div class="symptoms">
                                    <div class="svgDiv">

                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                                            stroke-linecap="round" stroke-linejoin="round">

                                            <path d="M22 12h-4l-3 6-4-12-3 6H2" />
                                        </svg>
                                        <p class="scenario-label">The Symptoms</p>
                                    </div>

                                    <p class="symptoms-text">{symptoms}</p>
                                </div>

                                <div class="bottom-problem-details">
                                    <div class="data-card estTime">
                                        <span
                                            style="color:#38bdf8;font-size:2.2rem;text-shadow:0 0 10px rgba(56, 189, 248, 0.7);">⏱</span>
                                        <div style="display:grid">
                                            <p>Estimated Time</p>
                                            <p>{estimatedTime}</p>
                                        </div>
                                    </div>
                                    <div class="data-card expRew">
                                        <span
                                            style="color:#facc15;font-size:2.2rem;text-shadow:0 0 10px rgba(250, 204, 21, 0.7);">☆</span>
                                        <div style="display:grid">
                                            <p>Exp Reward</p>
                                            <p>{expReward}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </template>



                </div>
            </section>

            <!-- CODE EDITOR -->
            <section class="glass-card editor-panel">

                <div class="card-header">
                    <span class="header-main">Code Editor</span>
                </div>
                <div>
                    <template if:true={dataLoaded}>

                        <textarea class="code-editor"
                            placeholder="*Once the problem is generated, you'll be able to write your code here"
                            onkeyup={handleCodeChange} onkeydown={tabspacing}
                            readonly={isReadonly}>{textAreacode}</textarea>


                        <div class="editor-footer">
                            <button class="primary-btn" onclick={submitSolution} disabled={isReadonly} data-id="Submit">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round"
                                    style="width: 20px;margin-right: 10px;">

                                    <path d="M22 2L11 13" />
                                    <path d="M22 2L15 22L11 13L2 9L22 2Z" 
                                    
                                    />

                                </svg>Submit
                                Solution</button>
                        </div>
                    </template>
                    <template if:false={dataLoaded}>
                        <div class="noData-class">

                            <div class="no-data-icon">
                                <span style="color:rgb(155 155 155);">&lt;/&gt;</span>
                                <span class="cross">×</span>
                            </div>

                            <h1 style="color:rgb(155 155 155);">Generate New Problem</h1>

                        </div>
                    </template>
                </div>

            </section>

            <!-- LIVE ACTIVITY -->
            <section class="activity-panel">
                <template if:true={submitting}>
                    <div class="submitting-state">
                        <div class="spinner"></div>
                        <span>Submitting your solution...</span>
                    </div>
                </template>
                <template if:false={submitting}>
                    <div class="glass-card results-panel">
                        <div style="padding-bottom: 10px;border-bottom: 1px solid rgb(75, 75, 75);">

                            <div style="display:flex;gap:5px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M12 3l7 4v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V7l7-4z" />
                                    <path d="M9 12l2 2 4-4" />
                                </svg>

                                <p class="result-label">Result</p>
                            </div>
                            <span class={resultClass}>{result}</span>

                        </div>
                        <div style="padding-bottom: 10px;border-bottom: 1px solid rgb(75, 75, 75);margin-top: 10px;">
                            <div style="display:flex;gap:5px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M12 3a9 9 0 0 0-9 9" />
                                    <path d="M21 12a9 9 0 0 0-9-9" />
                                    <path d="M5.5 18A9 9 0 0 0 18.5 18" />
                                    <path d="M12 12l4-4" />
                                    <circle cx="12" cy="12" r="1" />
                                </svg>

                                <p class="result-label">Score</p>
                            </div>
                            <span class="score">{score}%</span>
                        </div>

                        <div style="margin-top: 15px;">
                            <div style="display:flex;gap:5px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M9 18h6" />
                                    <path d="M10 22h4" />
                                    <path d="M12 2a7 7 0 0 0-4 12c1 1 1.5 2 1.5 4h5c0-2 .5-3 1.5-4A7 7 0 0 0 12 2z" />
                                </svg>

                                <p class="result-label">Reasoning</p>
                            </div>
                            <p class="reason-text">{reason}</p>
                        </div>
                    </div>



                    <div class="glass-card codeReview-panel">
                        <div style="display:flex;gap:5px;padding-bottom: 10px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="5" y="8" width="14" height="10" rx="2" />
                                <path d="M12 4v4" />
                                <path d="M9 2h6" />
                                <circle cx="9" cy="13" r="1" />
                                <circle cx="15" cy="13" r="1" />
                                <path d="M9 16h6" />
                            </svg>

                            <p class="reason-label">Code Review (AI)</p>
                        </div>

                        <div
                            style="display: grid;gap: 10px;min-height: 0px;flex: 0 0 90%;overflow: hidden;grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);height: 100%;">
                            <div style="display: flex;flex-direction: column;">
                                <p class="codereview-label">Strengths</p>
                                <div class="thegood">
                                    <template for:each={thegood} for:item="strength">
                                        <div style="display: flex;gap: 5px" key={strength}>
                                            <p>✔</p>{strength}
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div style="display: flex;flex-direction: column;">
                                <p class="codereview-label">Areas For Improvement</p>

                                <div class="thebad">
                                    <template for:each={thebad} for:item="area">
                                        <div style="display: flex;gap: 5px" key={area}>
                                            <p>⚠</p>{area}
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </section>


        </div>
    </div>
</template>
