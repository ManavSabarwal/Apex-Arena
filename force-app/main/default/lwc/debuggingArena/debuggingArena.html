<template>
    <div class="app-container">

        <c-modal-component></c-modal-component>

        <!-- HEADER -->
        <div class="navbar">

                <div class="logo-section">
                    <div class="logo-icon">AA</div>
                    <div class="logo-text">Apex Arena</div>
                </div>

                <div class="nav-links">
                    <a class="active-link">Homepage</a>
                    <a>Contact</a>
                </div>

                <div class="nav-right">

                    <div class="user-box" title="Click to open profile">
                        <div class="avatar"></div>
                        <span>{loginName}</span>
                    </div>
                </div>

            </div>

        <!-- MAIN CONTENT -->
        <div class="main-layout">

            <!-- PROBLEM PANEL -->
            <section class="glass-card problem-panel">

                <div class="problem-header" >
                    <p>Problem</p>

                </div>

                <div class="difficulty-container">
                    <span class="difficultylabel">Difficulty</span>
                    <div class="difficulty-options">
                    <button class={easyClass} data-value="Easy" onclick={handleDifficulty}>Easy</button>
                    <button class={mediumClass} data-value="Medium" onclick={handleDifficulty}>Medium</button>
                    <button class={hardClass} data-value="Hard" onclick={handleDifficulty}>Hard</button>
                    </div>
                </div>

                <div class="type-container">
                    <span class="typelabel">Type</span>
                    <div class="type-options">
                    <button class={SynchronousApex} data-value="Sync Apex" onclick={handleType}>Synchronous Apex</button>
                    <button class={AsynchronousApex} data-value="Async Apex" onclick={handleType}>Asynchronous Apex</button>
                    <button class={Trigger} data-value="Trigger" onclick={handleType}>Trigger</button>
                    <button class={TestClass} data-value="Test Class" onclick={handleType}>Test Class</button>
                    </div>
                </div>
                <button class="generateProblem-btn" onclick={generateProblem}> Generate New Problem</button>

                <div class="scrollable-content">

                    <template if:true={isLoading}>
                        <div class="loading-state">
                            <div class="spinner"></div>
                            <span>Loading problem...</span>
                        </div>
                    </template>
                    <template if:false={isLoading}>
                        <template if:true={dataLoaded}>
                            <div class="problem-title-container">
                                <p class="problem-detail">Problem Details</p>
                                <p class="problem-title">{problemTitle}</p>
                                <span class="problemLevel">{difficultyfromPrompt}</span>
                            </div>
                        

                        <div>
                            <p class ="scenario-label">Scenario</p>
                            <p class="scenario-text">{scenario}</p>
                        </div> 
                        <div class="error-code-label">
                                <p>Erroneous Code</p>
                        </div>
                        <div class="error-code-container">
                            
                            <pre class="error-code-text">
                                {code}
                            </pre>
                        </div>
                        <div class="symptoms">
                            <p class="symptoms-label">The Symptoms</p>
                            <p class="symptoms-text">{symptoms}</p>
                        </div>
                        </template>
                    </template>

                    

                </div>
            </section>

            <!-- CODE EDITOR -->
            <section class="glass-card editor-panel">

                <div class="card-header">
                    <span class="header-main">Code Editor</span>
                </div>


                <div class="editor-area">
                    <textarea class="code-editor"
                        placeholder="*Once the problem is generated, the erroneous code will be displayed in this section for you to review and modify.
*Carefully analyze the provided symptoms and identify the sections of code responsible for the issue.
*Resolve the errors by eliminating or correcting the problematic logic to successfully complete the challenge."
                    onkeyup={handleCodeChange} onkeydown={tabspacing} readonly={isReadonly}>{textAreacode}</textarea>

                </div>

                <div class="editor-footer">
                    <button class="primary-btn" onclick={submitSolution} disabled={isReadonly}>Submit Solution</button>
                </div>

            </section>

            <!-- LIVE ACTIVITY -->
            <section class="activity-panel">
                <template if:true={submitting}>
                    <div class="submitting-state">
                        <div class="spinner"></div>
                        <span>Submitting your solution...</span>
                    </div>
                </template>
                <template if:false={submitting}>
                <div class="glass-card results-panel">
                    <p class="result-label">Result</p>
                    <span class={resultClass}>{result}</span>
                </div>

                <div class="glass-card reason-panel">
                    <p class="reason-label">Reasoning</p>
                    <p class="reason-text">{reason}</p>
                </div> 

                <div class="glass-card codeReview-panel">
                    <p class="reason-label">Code Review</p>
                    <p class="codereview-label">The Good</p>
                    <p class="reason-text thegood">{thegood}</p>
                    <p class="codereview-label">The Bad</p>
                    <p class="reason-text thebad ">{thebad}</p>
                </div> 
                </template>
            </section>


        </div>
    </div>
</template>
