<template>

    <!--Custom Login/Signup Component-->
    <template if:false={isLoggedIn}>

        <div class="title-container">
            <h1 class="app-title">Apex Arena</h1>
            <p class="app-subtitle">Train. Compete. Become a Salesforce Champion.</p>
        </div>
        <template if:false={signup}>
            <div class="login-container">
                <input type="text" onkeyup={handleUsernameChange} placeholder="Username"></input>
                <input type="password" onkeyup={handlePasswordChange} placeholder="Password"></input>
                <button onclick={login}>Login</button>
                <button onclick={showSignUp}>New User? Signup Here</button>
            </div>
        </template>
        <template if:true={signup}>
            <div class="signup-container">
                <input type="text" onkeyup={handleUsernameChange} placeholder="Username"></input>
                <input type="password" onkeyup={handlePasswordChange} placeholder="Password"></input>
                <button onclick={signUp}>Signup</button>
                <button onclick={showlogin}>Already have an account? Login Here</button>
            </div>
        </template>
    </template>

    <template if:true={isLoggedIn}>
        <div>
            <c-home-page ></c-home-page>
        </div>
    </template>
    
</template>
