<template>

    <div class="app-container">

        <template if:true={isNavigating}>
            <c-loading-animation></c-loading-animation>
        </template>

        <c-change-profilepic-modal onimagereceived={imageReceivedFunc}></c-change-profilepic-modal>

        <!-- HEADER -->
        <div class="navbar">

            <div class="logo-section">
                <div class="logo-icon">AA</div>
                <div class="logo-text">Apex Arena</div>
            </div>
            <div style="display:flex;gap:10px;">
                <span class={profileClass} onclick={handleSidebarItemClick} data-id="profile">
                    <svg class="profile-icon" viewBox="0 0 24 24" fill="currentColor" style="width: 20px;height: 20px;">
                        <path
                            d="M12 12C14.76 12 17 9.76 17 7C17 4.24 14.76 2 12 2C9.24 2 7 4.24 7 7C7 9.76 9.24 12 12 12Z" />

                        <path d="M4 22C4 17.58 7.58 14 12 14C16.42 14 20 17.58 20 22H4Z" />
                    </svg> Profile
                </span>
                <span class="sidebarItems" onclick={handleSidebarItemClick} data-id="code">

                    <svg class="coding-icon" viewBox="0 0 24 24" fill="none" style="width: 20px;height: 20px;">
                        <path d="M8 9L4 12L8 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M16 9L20 12L16 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M14 5L10 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>

                    Coding Arena</span>
                <span class="sidebarItems" onclick={handleSidebarItemClick} data-id="debug">

                    <svg class="debug-icon" viewBox="0 0 24 24" fill="none" style="width: 20px;height: 20px;">
                        <path d="M8 8L4 12L8 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M16 8L20 12L16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />

                        <path d="M12 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <circle cx="12" cy="12" r="2.5" fill="currentColor" />
                    </svg>
                    Debugging Arena</span>

                <span class="sidebarItems" onclick={handleSidebarItemClick} data-id="quiz">

                    <svg width="140" height="140" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        class="debug-icon" style="width: 20px;height: 20px;">
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                        <path d="M12 7V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <circle cx="12" cy="17" r="1.2" fill="currentColor" />
                    </svg>
                    Quiz Quest</span>

                <!--
                <span class={leaderboardClass} onclick={handleSidebarItemClick} data-id="leaderboard">

                    <svg class="leaderboard-icon" viewBox="0 0 24 24" fill="none" style="width: 20px;height: 20px;">
                        <path d="M7 21V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M12 21V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M17 21V8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M4 21H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M12 3L13 4.8L15 5.1L13.5 6.5L13.9 8.5L12 7.5L10.1 8.5L10.5 6.5L9 5.1L11 4.8L12 3Z"
                            fill="currentColor" />
                    </svg>

                    Leaderboards</span>

                    -->

                <span class={activityClass} onclick={handleSidebarItemClick} data-id="activity">

                    <svg class="activities-icon" viewBox="0 0 24 24" fill="none" style="width: 20px;height: 20px;">
                        <path d="M4 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M4 19H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

                        <path d="M7 15L10.5 11.5L13.5 14.5L19 8" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />

                        <circle cx="7" cy="15" r="1.5" fill="currentColor" />
                        <circle cx="10.5" cy="11.5" r="1.5" fill="currentColor" />
                        <circle cx="13.5" cy="14.5" r="1.5" fill="currentColor" />
                        <circle cx="19" cy="8" r="1.5" fill="currentColor" />
                    </svg>

                    Activities</span>

                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>

                    <input data-id="searchbar" type="text" placeholder="Search for Users or Challenges"
                        onkeyup={onSearchChange} />
                </div>

                <div class="logout-btn" onclick={handleLogout} title="Logout">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M10 17L15 12L10 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        <path d="M21 3V21H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span> Logout</span>
                </div>
            </div>



        </div>
        <template if:true={userSearchProfile}>
            <div style="    text-align: center;font-weight: 700;background: linear-gradient(45deg, #ed4b4b, orange);">
                <span>You are viewing {capitalizedName}'s profile. Navbar components would still take you to your
                    respective arenas</span>
                <button class="backToProfileButton" onclick={handleUserResultSelected} data-id='profile'> Back to My
                    Profile</button>
            </div>
        </template>
        <div class="display-container">

            <div class={searchBackdrop} onclick={closeSearch}></div>
            <div class={searchResultContClass}>

                <div
                    style="margin-right: 10px;border-right: 1px solid rgba(75, 75, 75, 0.5);padding-right: 10px;width:200px;">
                    <div class={menuItemUserClass} data-id="user" onclick={handleMenuItemClick}>
                        <span>Users</span>
                        <span class="countClass">{userCount}</span>

                    </div>
                    <div class={menuItemChallengeClass} data-id="challenge" onclick={handleMenuItemClick}>
                        <span>My Challenges</span>
                        <span class="countClass">{challengeCount}</span>

                    </div>
                </div>
                <div style="width: stretch;">
                    <template lwc:if={isUserItemSelected}>
                        <template for:each={searchusers} for:item="user">
                            <div key={user.recordId} data-id={user.title} class="resultItemDiv"
                                onclick={handleUserResultSelected}>
                                <p>{user.title}</p>
                                <p>{user.subtitle}</p>
                            </div>
                        </template>
                    </template>
                    <template lwc:else>
                        <template for:each={searchchallenges} for:item="item">
                            <div key={item.recordId} data-id={item.recordId} class="resultItemDiv"
                                onclick={handleChallengeResultSelected}>
                                <p>{item.title}</p>
                                <p>{item.subtitle}</p>
                            </div>
                        </template>
                    </template>
                </div>
            </div>
