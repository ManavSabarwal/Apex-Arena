<template>

    <template if:true={showModal}>

        <!-- BACKDROP -->
        <div class="backdrop"></div>

        <!-- MODAL -->
        <section class="modal-container">

                <div class="sample-data-header">
                    <h1 class="sample-data-label">Sample Data</h1>
                    <button class="close-btn" onclick={closeModal}>✕</button>
                </div>
                <div class="sample-data-container">
                    <template for:each={sampleData} for:item="item">
                        <div key={item.id} class="sample-data">
                            <p class="scenario-label">Scenario {item.Id}</p>
                            <div class="text-class">
                            <pre class="sample-data-text">{item.scenario}</pre>
                            <pre class="expected-output">{item.expectedOutput}</pre>
                            </div>
                        </div>
                    </template>
                </div>

        </section>

    </template>
