<template>

    <template if:true={showModal}>
        
        <!-- BACKDROP -->
        <div class="backdrop"></div>

        <!-- MODAL -->
        <section class="modal-container">

            <!-- CLOSE -->
            <button class="close-btn" onclick={closeModal}>
                ✕
            </button>

            <div class="data-container">

                <div class="sample-data-container">
                    <h1 class = "sample-data-label">Sample Data</h1>
                    <pre class="sample-data">{sampleData}</pre>
                </div>
                <div class="expected-output-container">
                    <h1 class="expected-output-label">Expected Output</h1>
                    <pre class="expected-output">{expectedOutput}</pre>
                </div>

            </div>

        </section>
    
</template>
