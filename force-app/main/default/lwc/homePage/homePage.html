<!-- codingArenaHome.html -->
<template>

    <div class="app-container">

        <template if:true={isNavigating}>
            <c-loading-animation></c-loading-animation>
        </template>

        <!-- MAIN CONTENT -->
        <div class="main-container">

            <!-- TOP NAVBAR -->
            <c-nav-bar-component onnavigate={setNavigating}></c-nav-bar-component>

            <!-- HERO -->
            <div class="hero-section">

                <h1 class="hero-title">
                    Welcome, {loginName} Choose Your Path:
                </h1>

                <div class="cards-container">

                    <!-- CARD 1 -->
                    <div class="path-card">



                        <div class="card-icon">
                            <lightning-icon icon-name="utility:setup" size="large">
                            </lightning-icon>
                        </div>

                        <h2>Path 1: Code Architect</h2>

                        <p>
                            Architect solutions from scratch. Tackle
                            core algorithms and submit your optimized
                            code for analysis.
                        </p>

                        <button class="filled-btn" onclick={startBuilding}>
                            Start Building
                        </button>

                    </div>

                    <!-- CARD 2 -->
                    <div class="path-card">



                        <div class="card-icon">
                            <lightning-icon icon-name="utility:bug" size="large">
                            </lightning-icon>
                        </div>

                        <h2>Path 2: Debug Master</h2>

                        <p>
                            Analyze, Identify, and Correct. Fix flawed
                            code snippets across multiple languages
                            to climb the Debug Leaderboard.
                        </p>

                        <button class="outline-btn" onclick={startDebugging}>
                            Start Debugging
                        </button>

                    </div>

                    <!-- CARD 3 -->
                    <div class="path-card">



                        <div class="card-icon">
                            <lightning-icon icon-name="utility:question_mark" size="large" alternative-text="Quiz">
                            </lightning-icon>
                        </div>

                        <h2>Path 3: Quiz Quest</h2>

                        <p>
                            Test Your Salesforce Knowledge
                            with timed MCQs across clouds, certificates
                            and other topics.
                        </p>

                        <button class="filled-btn" onclick={startQuizing}>
                            Get Started
                        </button>

                    </div>



                </div>

            </div>

        </div>

    </div>
</template>
