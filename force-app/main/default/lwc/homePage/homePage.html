<!-- codingArenaHome.html -->
<template>

    <div class="app-container">

        <!-- MAIN CONTENT -->
        <div class="main-container">

            <!-- TOP NAVBAR -->
            <div class="navbar">

                <div class="logo-section">
                    <div class="logo-icon">AA</div>
                    <div class="logo-text">Apex Arena</div>
                </div>

                <div class="nav-links">
                    <a class="active-link">Homepage</a>
                    <a>Contact</a>
                </div>

                <div class="nav-right">

                    <div class="user-box" title="Click to open profile">
                        <div class="avatar"></div>
                        <span>{loginName}</span>
                    </div>
                </div>

            </div>

            <!-- HERO -->
            <div class="hero-section">

                <h1 class="hero-title">
                    Welcome, {loginName} Choose Your Path:
                </h1>

                <div class="cards-container">

                    <!-- CARD 1 -->
                    <div class="path-card">

                        

                        <div class="card-icon">
                            <lightning-icon
                                icon-name="utility:bug"
                                size="large">
                            </lightning-icon>
                        </div>

                        <h2>Path 1: Debug Master</h2>

                        <p>
                            Analyze, Identify, and Correct. Fix flawed
                            code snippets across multiple languages
                            to climb the Debug Leaderboard.
                        </p>

                        <button class="outline-btn" onclick={startDebugging}>
                            Start Debugging
                        </button>

                    </div>

                    <!-- CARD 2 -->
                    <div class="path-card">

                       

                        <div class="card-icon">
                            <lightning-icon
                                icon-name="utility:setup"
                                size="large">
                            </lightning-icon>
                        </div>

                        <h2>Path 2: Code Architect</h2>

                        <p>
                            Architect solutions from scratch. Tackle
                            core algorithms and submit your optimized
                            code for analysis.
                        </p>

                        <button class="filled-btn" onclick={startBuilding}>
                            Start Building
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>
</template>
